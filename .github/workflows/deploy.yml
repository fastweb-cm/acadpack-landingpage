name: 🚀 Deploy to cPanel

on:
    push:
        branches: [main]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: 🚚 Checkout code
              uses: actions/checkout@v4

            - name: 🏗 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: 📦 Install dependencies
              run: npm ci

            - name: 🛠 Build Next.js
              run: npm run build

            - name: 🧹 Prepare Files for FTP
              run: |
                  # 1. Move the production server and node_modules to the root
                  cp -r .next/standalone/. ./

                  # 2. Ensure static assets are in the internal .next folder
                  mkdir -p .next/static
                  cp -r .next/static/. .next/static/
                  cp -r public/. public/

                  # 3. Clean up the standalone folder so it's not duplicated
                  rm -rf .next/standalone

            - name: 📂 Sync to cPanel via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ftps
                  port: 21
                  # Path where your Node app is hosted in cPanel
                  local-dir: .next/standalone/
                  server-dir: ./
